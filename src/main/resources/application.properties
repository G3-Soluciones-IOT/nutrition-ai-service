spring.application.name=nutrition-ai-service
spring.config.import=optional:configserver:${CONFIG_SERVER_URI:http://config-service:8888}
spring.cloud.config.fail-fast=false
spring.cloud.config.retry.max-attempts=20
spring.cloud.config.retry.initial-interval=1000
spring.cloud.config.retry.max-interval=3000

server.port=${SERVER_PORT:8091}

spring.datasource.url=jdbc:postgresql://${NUTRITION_AI_DB_HOST:localhost}:${NUTRITION_AI_DB_PORT:5432}/${NUTRITION_AI_DB_NAME:jameofit_nutrition_ai}
spring.datasource.username=${NUTRITION_AI_DB_USER:postgres}
spring.datasource.password=${NUTRITION_AI_DB_PASSWORD:12345678}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.open-in-view=false

spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${IAM_JWKS_URI:http://iam-service:8081/api/v1/jwks/.well-known/jwks.json}

eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:${EUREKA_URI:http://eureka-service:8761/eureka/}}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=false
eureka.instance.hostname=${EUREKA_INSTANCE_HOSTNAME:nutrition-ai-service}
eureka.instance.instance-id=${spring.application.name}:${server.port}

vertex-ai.project-id=${GCP_PROJECT_ID:}
vertex-ai.location=${GCP_LOCATION:us-central1}
vertex-ai.model=${GEMINI_MODEL:gemini-2.5-flash}

nutrition-ai.timezone=America/Lima
nutrition-ai.noon-cron=0 0 12 * * *
nutrition-ai.night-cron=0 0 20 * * *
nutrition-ai.internal-token=${NUTRITION_AI_INTERNAL_TOKEN:internal-service-secret-key}
authorization.internal-service.secret=${INTERNAL_SERVICE_SECRET:${NUTRITION_AI_INTERNAL_TOKEN:internal-service-secret-key}}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
